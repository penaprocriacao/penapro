<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PenaPro — Painel</title>
<meta name="theme-color" content="#c9a84c">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#060810;--card:rgba(255,255,255,0.025);--brd:rgba(255,255,255,0.05);--gold:#c9a84c;--gold2:#e8cc73;--goldDim:rgba(201,168,76,0.08);--g:#3ecf8e;--gDim:rgba(62,207,142,0.06);--r:#f05a5a;--rDim:rgba(240,90,90,0.06);--b:#5b9cf5;--y:#e8a838;--tx:#c0c8d4;--dim:#5a6270;--w:#fff}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(201,168,76,0.025),transparent 50%);pointer-events:none}
.topbar{position:fixed;top:0;width:100%;z-index:100;padding:12px 0;background:rgba(6,8,16,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--brd)}
.topbar-inner{max-width:1000px;margin:0 auto;padding:0 20px;display:flex;justify-content:space-between;align-items:center}
.logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--w);cursor:pointer}.logo span{color:var(--gold)}
.topbar-right{display:flex;gap:12px;align-items:center}
.topbar-user{font-size:12px;color:var(--dim)}
.tb{padding:8px 16px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.tb.p{background:var(--gold);color:var(--bg)}.tb.s{background:rgba(255,255,255,0.04);color:var(--dim);border:1px solid var(--brd)}
.wrap{max-width:1000px;margin:0 auto;padding:72px 20px 40px}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{width:100%;max-width:400px;text-align:center}
.login-box h1{font-family:'Cormorant Garamond',serif;font-size:36px;color:var(--w)}.login-box h1 span{color:var(--gold)}
.login-box .sub{font-size:12px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin:4px 0 32px}
.crd{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:28px 24px;margin-bottom:14px}
.crd h2{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--w);margin-bottom:16px}
.f{margin-bottom:14px}
.f label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;font-weight:600;display:block;margin-bottom:6px}
.f input,.f select,.f textarea{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--brd);background:rgba(255,255,255,0.03);color:var(--w);font-size:14px;font-family:'DM Sans',sans-serif;outline:none}
.f input:focus,.f select:focus{border-color:var(--gold)}
.f textarea{resize:vertical;min-height:60px}
.btn{padding:14px 24px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;transition:all .2s}
.btn.p{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg)}
.btn.s{background:rgba(255,255,255,0.04);color:var(--dim);border:1px solid var(--brd)}
.btn.d{background:var(--rDim);color:var(--r);border:1px solid rgba(240,90,90,0.15)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.st{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:16px;text-align:center}
.st-v{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--gold)}
.st-l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-top:2px}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.sh-t{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--w)}
.cc{background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:16px 20px;margin-bottom:8px;cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:center;gap:12px}
.cc:hover{border-color:rgba(201,168,76,0.15)}
.cc-n{font-weight:700;color:var(--w);font-size:14px}
.cc-m{font-size:11px;color:var(--dim);margin-top:2px}
.cc-e{text-align:right;min-width:100px}
.cc-d{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700}
.cc-el{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.3px}
.bg{padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.bg-u{background:var(--rDim);color:var(--r)}.bg-a{background:rgba(232,168,56,0.08);color:var(--y)}.bg-n{background:var(--gDim);color:var(--g)}
.acts{display:flex;gap:10px;margin-top:20px}
.bk{font-size:12px;color:var(--dim);cursor:pointer;margin-bottom:16px;display:inline-block}.bk:hover{color:var(--gold)}
.ov{position:fixed;inset:0;background:rgba(6,8,16,0.9);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.ov-b{background:#0f1118;border:1px solid var(--brd);border-radius:16px;padding:32px;max-width:400px;text-align:center}
.empty{text-align:center;padding:60px 20px;color:var(--dim)}
.loading{text-align:center;padding:40px;color:var(--gold);font-size:14px}
.err{background:var(--rDim);border:1px solid rgba(240,90,90,0.15);border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:var(--r)}
@media(max-width:600px){.stats-row{grid-template-columns:1fr 1fr}.g2,.g3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"><div class="loading">Carregando PenaPro...</div></div>
<script>
// ============================================
// CONFIGURAÇÃO — Substitua pelos seus dados
// ============================================
const SUPABASE_URL = 'https://SEU_PROJETO.supabase.co';
const SUPABASE_KEY = 'SUA_ANON_KEY_AQUI';
// ============================================

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let user = null;
let clients = [];
let page = 'loading';
let editId = null;
let confirmDel = null;
let errMsg = '';

// HELPERS
function m2a(m){if(!m||m<0.03)return"—";const a=Math.floor(m/12),rm=m%12,mo=Math.floor(rm),d=Math.round((rm-mo)*30);let r='';if(a>0)r+=a+'a';if(mo>0)r+=(r?' ':'')+mo+'m';if(d>0)r+=(r?' ':'')+d+'d';return r||'—'}
function addM(dt,m){if(!dt)return null;const d=new Date(dt);d.setMonth(d.getMonth()+Math.round(m));return d}
function fmt(d){if(!d)return"—";if(typeof d==='string')d=new Date(d);return d.toLocaleDateString("pt-BR")}
function diasAte(dt){if(!dt)return null;const d=typeof dt==='string'?new Date(dt):dt;return Math.round((d-new Date())/86400000)}

function calcPE(c){
  const rem=Math.floor((c.dias_trabalhados||0)/3)+Math.floor((c.horas_estudo||0)/12)+Math.min((c.livros_lidos||0)*4,48);
  return Math.max(1,(c.pena_definitiva||0)-(c.detracao_dias||0)/30-rem/30);
}

function calcProx(c){
  const pe=calcPE(c);
  const p=c.condicao==='primario',h=c.hediondo,v=c.violencia,o=c.org_criminosa,re=c.condicao==='reincidente_especifico';
  let fr;if(o)fr=3/4;else if(h)fr=p?2/5:(re?3/5:1/2);else if(v)fr=p?1/4:3/10;else fr=p?4/25:1/5;
  let lf;if(o)lf=null;else if(h)lf=re?null:2/3;else lf=p?1/3:1/2;
  const dt=c.dt_inicio_cumprimento;
  if(!dt)return{evento:"Sem data",dias:null};
  const hoje=new Date();
  const evts=[];
  const prog=addM(dt,pe*fr);if(prog>hoje)evts.push({nome:"Progressão",data:prog,dias:diasAte(prog)});
  if(lf){const liv=addM(dt,pe*lf);if(liv>hoje)evts.push({nome:"Livramento",data:liv,dias:diasAte(liv)})}
  const fim=addM(dt,pe);if(fim>hoje)evts.push({nome:"Término",data:fim,dias:diasAte(fim)});
  evts.sort((a,b)=>a.dias-b.dias);
  return evts[0]||{evento:"Pena cumprida",dias:0};
}

// AUTH
async function checkAuth(){
  const {data}=await sb.auth.getUser();
  if(data.user){user=data.user;await loadClients();page='dashboard'}
  else{page='login'}
  render();
}

async function doLogin(){
  errMsg='';
  const email=document.getElementById('le').value;
  const pass=document.getElementById('lp').value;
  if(!email||!pass){errMsg='Preencha e-mail e senha.';render();return}
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){errMsg=error.message==='Invalid login credentials'?'E-mail ou senha incorretos.':error.message;render();return}
  user=data.user;await loadClients();page='dashboard';render();
}

async function doRegister(){
  errMsg='';
  const nome=document.getElementById('rn').value;
  const email=document.getElementById('re').value;
  const pass=document.getElementById('rp').value;
  const lgpd=document.getElementById('lgpd').checked;
  if(!nome||!email||!pass){errMsg='Preencha todos os campos.';render();return}
  if(pass.length<6){errMsg='Senha deve ter no mínimo 6 caracteres.';render();return}
  if(!lgpd){errMsg='Você precisa aceitar os Termos de Uso e a Política de Privacidade para continuar.';render();return}
  const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{nome,lgpd_aceite:new Date().toISOString()}}});
  if(error){errMsg=error.message;render();return}
  if(data.user){user=data.user;page='manual';render()}
  else{errMsg='Verifique seu e-mail para confirmar o cadastro.';render()}
}

async function doLogout(){
  await sb.auth.signOut();user=null;clients=[];page='login';render();
}

async function doResetPass(){
  errMsg='';
  const email=document.getElementById('reset_email').value;
  if(!email){errMsg='Digite seu e-mail.';render();return}
  const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://penapro.com.br/painel.html'});
  if(error){errMsg=error.message;render();return}
  errMsg='';page='reset_ok';render();
}

// CRUD
async function loadClients(){
  const {data,error}=await sb.from('clients').select('*').eq('user_id',user.id).order('created_at',{ascending:false});
  clients=error?[]:data||[];
}

async function saveForm(id){
  const d={
    nome_reu:document.getElementById('f_nome').value,
    cpf:document.getElementById('f_cpf').value,
    num_processo:document.getElementById('f_proc').value,
    vara:document.getElementById('f_vara').value,
    crime:document.getElementById('f_crime').value,
    artigo:document.getElementById('f_artigo').value,
    pena_definitiva:(parseInt(document.getElementById('f_pena_a').value)||0)*12+(parseInt(document.getElementById('f_pena_m').value)||0)+(parseInt(document.getElementById('f_pena_d').value)||0)/30,
    pena_dias:parseInt(document.getElementById('f_pena_d').value)||0,
    regime:document.getElementById('f_regime').value,
    condicao:document.getElementById('f_cond').value,
    dt_transito:document.getElementById('f_transito').value||null,
    dt_inicio_cumprimento:document.getElementById('f_inicio').value||null,
    detracao_dias:parseInt(document.getElementById('f_detracao').value)||0,
    dias_trabalhados:parseInt(document.getElementById('f_trab').value)||0,
    horas_estudo:parseInt(document.getElementById('f_estudo').value)||0,
    livros_lidos:parseInt(document.getElementById('f_livros').value)||0,
    hediondo:document.getElementById('f_hediondo').checked,
    violencia:document.getElementById('f_violencia').checked,
    org_criminosa:document.getElementById('f_org').checked,
    observacoes:document.getElementById('f_obs').value,
  };
  if(!d.nome_reu){errMsg='O nome do réu é obrigatório.';render();return}
  if(id){
    await sb.from('clients').update(d).eq('id',id);
    await loadClients();page='view';editId=id;
  } else {
    d.user_id=user.id;
    const {data}=await sb.from('clients').insert(d).select().single();
    await loadClients();if(data){page='view';editId=data.id}else{page='dashboard'}
  }
  errMsg='';render();
}

async function doDelete(id){
  await sb.from('clients').delete().eq('id',id);
  await loadClients();confirmDel=null;page='dashboard';render();
}

async function toggleArchive(id,val){
  await sb.from('clients').update({arquivado:val}).eq('id',id);
  await loadClients();page='dashboard';render();
}

function nav(p,id){page=p;editId=id||null;confirmDel=null;errMsg='';render()}

// RENDER
function render(){
  const app=document.getElementById('app');
  let h='';

  if(page==='loading'){app.innerHTML='<div class="loading">Carregando PenaPro...</div>';return}

  // LOGIN
  if(page==='login'){
    app.innerHTML=`<div class="login-wrap"><div class="login-box">
    <h1>Pena<span>Pro</span></h1><div class="sub">Cálculos Penais Inteligentes</div>
    <div class="crd" style="text-align:left">
    ${errMsg?`<div class="err">${errMsg}</div>`:''}
    <div class="f"><label>E-mail</label><input type="email" id="le" placeholder="seu@email.com"></div>
    <div class="f"><label>Senha</label><input type="password" id="lp" placeholder="Sua senha" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn p" onclick="doLogin()" style="margin-top:8px">Entrar</button>
    <p style="text-align:center;margin-top:12px;font-size:12px"><span style="color:var(--gold);cursor:pointer" onclick="nav('forgot')">Esqueci minha senha</span></p>
    <p style="text-align:center;margin-top:8px;font-size:12px;color:var(--dim)">Não tem conta? <span style="color:var(--gold);cursor:pointer" onclick="nav('register')">Criar conta</span></p>
    </div></div></div>`;return;
  }

  // FORGOT PASSWORD
  if(page==='forgot'){
    app.innerHTML=`<div class="login-wrap"><div class="login-box">
    <h1>Pena<span>Pro</span></h1><div class="sub">Recuperar senha</div>
    <div class="crd" style="text-align:left">
    ${errMsg?`<div class="err">${errMsg}</div>`:''}
    <p style="font-size:13px;color:var(--dim);margin-bottom:16px">Digite o e-mail da sua conta. Enviaremos um link para criar uma nova senha.</p>
    <div class="f"><label>E-mail</label><input type="email" id="reset_email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')doResetPass()"></div>
    <button class="btn p" onclick="doResetPass()" style="margin-top:8px">Enviar link de recuperação</button>
    <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--dim)">Lembrou? <span style="color:var(--gold);cursor:pointer" onclick="nav('login')">Voltar ao login</span></p>
    </div></div></div>`;return;
  }

  // RESET OK
  if(page==='reset_ok'){
    app.innerHTML=`<div class="login-wrap"><div class="login-box">
    <h1>Pena<span>Pro</span></h1><div class="sub">E-mail enviado</div>
    <div class="crd" style="text-align:center">
    <div style="font-size:40px;margin-bottom:16px;opacity:.5">✉</div>
    <p style="font-size:14px;color:var(--w);margin-bottom:8px">Verifique sua caixa de entrada</p>
    <p style="font-size:13px;color:var(--dim);margin-bottom:20px">Enviamos um link para redefinir sua senha. Confira também a pasta de spam.</p>
    <button class="btn s" onclick="nav('login')">Voltar ao login</button>
    </div></div></div>`;return;
  }

  // REGISTER
  if(page==='register'){
    app.innerHTML=`<div class="login-wrap"><div class="login-box">
    <h1>Pena<span>Pro</span></h1><div class="sub">Criar conta</div>
    <div class="crd" style="text-align:left">
    ${errMsg?`<div class="err">${errMsg}</div>`:''}
    <div class="f"><label>Nome completo</label><input id="rn" placeholder="Seu nome"></div>
    <div class="f"><label>E-mail</label><input type="email" id="re" placeholder="seu@email.com"></div>
    <div class="f"><label>Senha (mín. 6 caracteres)</label><input type="password" id="rp" placeholder="Crie uma senha" onkeydown="if(event.key==='Enter')doRegister()"></div>
    <div style="margin:16px 0;padding:14px;background:rgba(255,255,255,0.015);border-radius:10px;border:1px solid var(--brd)">
    <label style="display:flex;gap:10px;align-items:start;cursor:pointer;font-size:12px;color:var(--dim);line-height:1.6">
    <input type="checkbox" id="lgpd" style="margin-top:4px;flex-shrink:0">
    <span>Li e concordo com os <span style="color:var(--gold);cursor:pointer" onclick="event.stopPropagation();nav('termos')">Termos de Uso</span> e a <span style="color:var(--gold);cursor:pointer" onclick="event.stopPropagation();nav('privacidade')">Política de Privacidade</span>. Autorizo o tratamento dos meus dados pessoais e dos dados inseridos na plataforma conforme a LGPD (Lei 13.709/2018), exclusivamente para a prestação do serviço contratado.</span>
    </label></div>
    <button class="btn p" onclick="doRegister()" style="margin-top:8px">Criar Conta</button>
    <p style="text-align:center;margin-top:16px;font-size:12px;color:var(--dim)">Já tem conta? <span style="color:var(--gold);cursor:pointer" onclick="nav('login')">Entrar</span></p>
    </div></div></div>`;return;
  }

  // TERMOS DE USO
  if(page==='termos'){
    app.innerHTML=`<div class="login-wrap"><div class="login-box" style="max-width:600px;text-align:left">
    <div class="crd">
    <h2 style="font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--w);margin-bottom:16px">Termos de Uso — PenaPro</h2>
    <div style="font-size:12px;color:var(--dim);line-height:2;max-height:400px;overflow-y:auto;padding-right:10px">
    <p><b style="color:var(--w)">1. Objeto.</b> A plataforma PenaPro é uma ferramenta auxiliar de cálculos penais (dosimetria, prescrição e execução penal). Os resultados são meramente indicativos e não substituem a análise jurídica profissional do advogado.</p>
    <p><b style="color:var(--w)">2. Responsabilidade.</b> O PenaPro não se responsabiliza por decisões judiciais, petições, pareceres ou qualquer ato profissional baseado exclusivamente nos cálculos da plataforma. O usuário é o único responsável pela verificação e aplicação dos resultados.</p>
    <p><b style="color:var(--w)">3. Conta e acesso.</b> O usuário é responsável por manter a confidencialidade de sua senha e por todas as atividades realizadas em sua conta. O compartilhamento de credenciais é vedado.</p>
    <p><b style="color:var(--w)">4. Dados de clientes.</b> Os dados de terceiros inseridos na plataforma (réus, processos) são de exclusiva responsabilidade do usuário, que declara possuir autorização ou base legal para o tratamento desses dados conforme a LGPD.</p>
    <p><b style="color:var(--w)">5. Disponibilidade.</b> O PenaPro empenhará esforços razoáveis para manter a plataforma disponível, mas não garante funcionamento ininterrupto. Manutenções programadas poderão ocorrer.</p>
    <p><b style="color:var(--w)">6. Propriedade intelectual.</b> Todo o conteúdo, código, design e funcionalidades do PenaPro são de propriedade exclusiva de seus desenvolvedores, protegidos pela legislação de direitos autorais.</p>
    <p><b style="color:var(--w)">7. Cancelamento.</b> O usuário pode cancelar sua assinatura a qualquer momento. Após o cancelamento, o acesso permanece até o fim do período pago. Os dados podem ser exportados antes do cancelamento.</p>
    <p><b style="color:var(--w)">8. Alterações.</b> Estes termos podem ser atualizados. O uso continuado da plataforma após alterações implica aceitação dos novos termos.</p>
    <p><b style="color:var(--w)">9. Foro.</b> Fica eleito o foro da comarca de Brasília/DF para dirimir quaisquer questões oriundas destes termos.</p>
    </div>
    <button class="btn s" onclick="nav('register')" style="margin-top:16px">← Voltar ao cadastro</button>
    </div></div></div>`;return;
  }

  // POLÍTICA DE PRIVACIDADE
  if(page==='privacidade'){
    app.innerHTML=`<div class="login-wrap"><div class="login-box" style="max-width:600px;text-align:left">
    <div class="crd">
    <h2 style="font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--w);margin-bottom:16px">Política de Privacidade — PenaPro</h2>
    <div style="font-size:12px;color:var(--dim);line-height:2;max-height:400px;overflow-y:auto;padding-right:10px">
    <p><b style="color:var(--w)">1. Controlador.</b> O controlador dos dados pessoais é o PenaPro, com sede em Brasília/DF. Contato: contato@penapro.com.br.</p>
    <p><b style="color:var(--w)">2. Dados coletados.</b> Coletamos: (a) dados de cadastro — nome, e-mail; (b) dados de uso — funcionalidades acessadas, cálculos realizados; (c) dados de clientes inseridos pelo usuário — nomes de réus, números de processos, dados processuais.</p>
    <p><b style="color:var(--w)">3. Finalidade.</b> Os dados são tratados exclusivamente para: (a) prestação do serviço contratado; (b) autenticação e segurança da conta; (c) comunicações relacionadas ao serviço; (d) melhoria da plataforma.</p>
    <p><b style="color:var(--w)">4. Base legal.</b> O tratamento é fundamentado no consentimento do titular (Art. 7º, I, LGPD) e na execução de contrato (Art. 7º, V, LGPD).</p>
    <p><b style="color:var(--w)">5. Compartilhamento.</b> Os dados NÃO são compartilhados com terceiros, exceto: (a) prestadores de serviço essenciais (hospedagem, banco de dados) sob obrigação de confidencialidade; (b) por determinação legal ou judicial.</p>
    <p><b style="color:var(--w)">6. Armazenamento.</b> Os dados são armazenados em servidores seguros (Supabase, região São Paulo), com criptografia em trânsito (TLS) e em repouso. O acesso é restrito por Row Level Security — cada usuário acessa apenas seus próprios dados.</p>
    <p><b style="color:var(--w)">7. Retenção.</b> Os dados são mantidos enquanto a conta estiver ativa. Após exclusão da conta, os dados são removidos em até 30 dias, exceto quando houver obrigação legal de retenção.</p>
    <p><b style="color:var(--w)">8. Direitos do titular.</b> Conforme a LGPD, o usuário tem direito a: acesso, correção, exclusão, portabilidade e revogação do consentimento. Para exercer esses direitos, entre em contato pelo e-mail acima.</p>
    <p><b style="color:var(--w)">9. Cookies.</b> A plataforma utiliza apenas cookies essenciais para autenticação. Não utilizamos cookies de rastreamento ou publicidade.</p>
    <p><b style="color:var(--w)">10. Dados de terceiros.</b> O usuário que insere dados de clientes (réus) na plataforma declara ser o responsável pelo tratamento desses dados perante os respectivos titulares, assumindo integral responsabilidade pela licitude do tratamento.</p>
    </div>
    <button class="btn s" onclick="nav('register')" style="margin-top:16px">← Voltar ao cadastro</button>
    </div></div></div>`;return;
  }

  // MANUAL / ONBOARDING
  if(page==='manual'){
    app.innerHTML=`<div class="login-wrap"><div class="login-box" style="max-width:650px;text-align:left">
    <div class="crd">
    <h2 style="font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--w);margin-bottom:6px">Bem-vindo ao PenaPro</h2>
    <p style="font-size:13px;color:var(--gold);margin-bottom:24px">Guia rápido — 3 minutos para dominar a plataforma</p>
    <div style="font-size:13px;color:var(--tx);line-height:2">

    <div style="display:flex;gap:14px;align-items:start;margin-bottom:20px;padding:16px;background:rgba(201,168,76,0.03);border-radius:12px;border:1px solid rgba(201,168,76,0.08)">
    <div style="width:32px;height:32px;border-radius:8px;background:var(--goldDim);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--gold)">1</div>
    <div><b style="color:var(--w)">Cadastre seu cliente</b><br>Clique em <b>+ Novo Cliente</b> no painel. Preencha nome, processo, crime, pena e datas. O sistema calcula automaticamente progressão, livramento e término.</div></div>

    <div style="display:flex;gap:14px;align-items:start;margin-bottom:20px;padding:16px;background:rgba(62,207,142,0.03);border-radius:12px;border:1px solid rgba(62,207,142,0.08)">
    <div style="width:32px;height:32px;border-radius:8px;background:var(--gDim);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--g)">2</div>
    <div><b style="color:var(--w)">Acompanhe os prazos</b><br>O painel ordena seus clientes pelo próximo evento. Badges coloridos indicam urgência: <span style="color:var(--r)">vermelho</span> (≤30 dias), <span style="color:var(--y)">amarelo</span> (≤90 dias), <span style="color:var(--g)">verde</span> (normal).</div></div>

    <div style="display:flex;gap:14px;align-items:start;margin-bottom:20px;padding:16px;background:rgba(91,156,245,0.03);border-radius:12px;border:1px solid rgba(91,156,245,0.08)">
    <div style="width:32px;height:32px;border-radius:8px;background:rgba(91,156,245,0.06);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--b)">3</div>
    <div><b style="color:var(--w)">Use a calculadora avançada</b><br>Clique em <b>Calculadora</b> no topo para cálculos completos: dosimetria trifásica, prescrição com marcos, execução penal com remição, concurso de crimes e relatórios.</div></div>

    <div style="display:flex;gap:14px;align-items:start;margin-bottom:20px;padding:16px;background:rgba(255,255,255,0.02);border-radius:12px;border:1px solid var(--brd)">
    <div style="width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--dim)">4</div>
    <div><b style="color:var(--w)">Gere relatórios e petições</b><br>Na calculadora, a última etapa gera 3 documentos com um clique: relatório técnico (para você), relatório para o cliente (linguagem simples) e minuta de petição de progressão.</div></div>

    </div>
    <div style="padding:14px;background:var(--goldDim);border-radius:10px;border:1px solid rgba(201,168,76,0.1);margin-top:8px">
    <p style="font-size:12px;color:var(--gold);margin:0"><b>Seus dados estão seguros.</b> Cada advogado só acessa seus próprios clientes. Os dados são criptografados e armazenados em servidores no Brasil (São Paulo). Conforme a LGPD.</p>
    </div>
    <button class="btn p" onclick="nav('dashboard')" style="margin-top:20px">Começar a usar o PenaPro</button>
    </div></div></div>`;return;
  }

  // TOPBAR
  const nome=user?.user_metadata?.nome||user?.email?.split('@')[0]||'';
  h+=`<div class="topbar"><div class="topbar-inner">
  <div class="logo" onclick="nav('dashboard')">Pena<span>Pro</span></div>
  <div class="topbar-right">
  <span class="topbar-user">${nome}</span>
  <button class="tb s" onclick="window.open('app.html')">Calculadora</button>
  <button class="tb s" onclick="nav('manual')">Guia</button>
  <button class="tb s" onclick="doLogout()">Sair</button>
  </div></div></div><div class="wrap">`;

  // DASHBOARD
  if(page==='dashboard'){
    const ativos=clients.filter(c=>!c.arquivado);
    const arqs=clients.filter(c=>c.arquivado);
    const comEvt=ativos.map(c=>({...c,px:calcProx(c)}));
    const urg=comEvt.filter(e=>e.px.dias!==null&&e.px.dias<=30).length;
    const atn=comEvt.filter(e=>e.px.dias!==null&&e.px.dias>30&&e.px.dias<=90).length;
    comEvt.sort((a,b)=>{if(a.px.dias===null)return 1;if(b.px.dias===null)return-1;return a.px.dias-b.px.dias});

    h+=`<div class="stats-row">
    <div class="st"><div class="st-v">${ativos.length}</div><div class="st-l">Clientes</div></div>
    <div class="st"><div class="st-v" style="color:var(--r)">${urg}</div><div class="st-l">Urgentes</div></div>
    <div class="st"><div class="st-v" style="color:var(--y)">${atn}</div><div class="st-l">Atenção</div></div>
    <div class="st"><div class="st-v" style="color:var(--dim)">${arqs.length}</div><div class="st-l">Arquivados</div></div></div>`;

    h+=`<div class="sh"><div class="sh-t">Clientes</div><button class="tb p" onclick="nav('new')">+ Novo Cliente</button></div>`;

    if(comEvt.length===0)h+=`<div class="empty"><p style="font-size:15px;color:var(--w);margin-bottom:8px">Nenhum cliente cadastrado</p><p style="font-size:13px">Clique em <b>+ Novo Cliente</b> para começar</p></div>`;
    else comEvt.forEach(c=>{
      const d=c.px.dias;const st=d===null?'':d<=30?'bg bg-u':d<=90?'bg bg-a':'bg bg-n';
      const stT=d===null?'':d<=30?'Urgente':d<=90?'Atenção':'Normal';
      h+=`<div class="cc" onclick="nav('view','${c.id}')">
      <div><div class="cc-n">${c.nome_reu}</div><div class="cc-m">${c.crime||'—'} · ${c.num_processo||'—'} · ${m2a(c.pena_definitiva)}</div></div>
      <div class="cc-e">${d!==null?`<div class="cc-d" style="color:${d<=30?'var(--r)':d<=90?'var(--y)':'var(--g)'}">${d}d</div>`:''}<div class="cc-el">${c.px.evento}</div>${st?`<span class="${st}">${stT}</span>`:''}</div></div>`;
    });

    if(arqs.length>0){
      h+=`<div style="margin-top:32px"><div class="sh"><div class="sh-t" style="font-size:16px;color:var(--dim)">Arquivados (${arqs.length})</div></div>`;
      arqs.forEach(c=>{h+=`<div class="cc" style="opacity:.5" onclick="nav('view','${c.id}')"><div><div class="cc-n">${c.nome_reu}</div><div class="cc-m">${c.crime||'—'}</div></div></div>`});
      h+=`</div>`;
    }
  }

  // NEW / EDIT
  if(page==='new'||page==='edit'){
    const c=page==='edit'?clients.find(x=>x.id===editId)||{}:{};
    const isE=page==='edit';
    h+=`<span class="bk" onclick="nav('dashboard')">← Voltar</span>`;
    h+=`<div class="crd"><h2>${isE?'Editar':'Novo'} Cliente</h2>
    ${errMsg?`<div class="err">${errMsg}</div>`:''}
    <div class="g2"><div class="f"><label>Nome do réu *</label><input id="f_nome" value="${c.nome_reu||''}"></div>
    <div class="f"><label>CPF</label><input id="f_cpf" value="${c.cpf||''}"></div></div>
    <div class="g2"><div class="f"><label>Nº do processo</label><input id="f_proc" value="${c.num_processo||''}"></div>
    <div class="f"><label>Vara / Comarca</label><input id="f_vara" value="${c.vara||''}"></div></div>
    <div class="g2"><div class="f"><label>Crime</label><input id="f_crime" value="${c.crime||''}"></div>
    <div class="f"><label>Artigo</label><input id="f_artigo" value="${c.artigo||''}"></div></div>
    <div class="g3"><div class="f"><label>Pena — Anos</label><input type="number" min="0" id="f_pena_a" value="${Math.floor((c.pena_definitiva||0)/12)}"></div>
    <div class="f"><label>Pena — Meses</label><input type="number" min="0" max="11" id="f_pena_m" value="${Math.round((c.pena_definitiva||0)%12)}"></div>
    <div class="f"><label>Pena — Dias</label><input type="number" min="0" max="29" id="f_pena_d" value="${c.pena_dias||0}"></div></div>
    <div class="g3">
    <div class="f"><label>Regime inicial</label><select id="f_regime"><option value="Fechado"${c.regime==='Fechado'?' selected':''}>Fechado</option><option value="Semiaberto"${c.regime==='Semiaberto'?' selected':''}>Semiaberto</option><option value="Aberto"${c.regime==='Aberto'?' selected':''}>Aberto</option></select></div>
    <div class="f"><label>Condição</label><select id="f_cond"><option value="primario"${c.condicao==='primario'?' selected':''}>Primário</option><option value="reincidente"${c.condicao==='reincidente'?' selected':''}>Reincidente</option><option value="reincidente_especifico"${c.condicao==='reincidente_especifico'?' selected':''}>Reinc. específico</option></select></div></div>
    <div class="g3"><div class="f"><label>Trânsito em julgado</label><input type="date" id="f_transito" value="${c.dt_transito||''}"></div>
    <div class="f"><label>Início cumprimento</label><input type="date" id="f_inicio" value="${c.dt_inicio_cumprimento||''}"></div>
    <div class="f"><label>Detração (dias)</label><input type="number" id="f_detracao" value="${c.detracao_dias||0}"></div></div>
    <div class="g3"><div class="f"><label>Dias trabalhados</label><input type="number" id="f_trab" value="${c.dias_trabalhados||0}"></div>
    <div class="f"><label>Horas de estudo</label><input type="number" id="f_estudo" value="${c.horas_estudo||0}"></div>
    <div class="f"><label>Livros lidos</label><input type="number" id="f_livros" value="${c.livros_lidos||0}"></div></div>
    <div class="g3"><div class="f"><label style="display:flex;gap:6px;align-items:center;cursor:pointer"><input type="checkbox" id="f_hediondo"${c.hediondo?' checked':''}> Hediondo</label></div>
    <div class="f"><label style="display:flex;gap:6px;align-items:center;cursor:pointer"><input type="checkbox" id="f_violencia"${c.violencia?' checked':''}> Violência</label></div>
    <div class="f"><label style="display:flex;gap:6px;align-items:center;cursor:pointer"><input type="checkbox" id="f_org"${c.org_criminosa?' checked':''}> Org. criminosa</label></div></div>
    <div class="f"><label>Observações</label><textarea id="f_obs">${c.observacoes||''}</textarea></div>
    <div class="acts"><button class="btn p" onclick="saveForm('${isE?c.id:''}')">${isE?'Salvar':'Cadastrar'}</button>
    <button class="btn s" onclick="nav(${isE?"'view','"+c.id+"'":"'dashboard'"})">Cancelar</button></div></div>`;
  }

  // VIEW
  if(page==='view'){
    const c=clients.find(x=>x.id===editId);
    if(!c){nav('dashboard');return}
    const px=calcProx(c);const pe=calcPE(c);
    h+=`<span class="bk" onclick="nav('dashboard')">← Voltar</span>`;
    h+=`<div class="crd"><div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:12px">
    <div><h2 style="margin:0">${c.nome_reu}</h2><p style="font-size:12px;color:var(--dim);margin-top:4px">${c.num_processo||'—'} · ${c.vara||''}</p></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="tb p" onclick="nav('edit','${c.id}')">Editar</button>
    <button class="tb s" onclick="toggleArchive('${c.id}',${!c.arquivado})">${c.arquivado?'Desarquivar':'Arquivar'}</button>
    <button class="tb s" style="color:var(--r);border-color:rgba(240,90,90,.2)" onclick="confirmDel='${c.id}';render()">Excluir</button>
    </div></div></div>`;

    h+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
    <div class="st"><div class="st-l">Crime</div><div style="font-size:14px;color:var(--w);font-weight:600;margin-top:4px">${c.crime||'—'}</div><div style="font-size:11px;color:var(--dim)">${c.artigo||''}</div></div>
    <div class="st"><div class="st-l">Pena efetiva</div><div class="st-v">${m2a(pe)}</div><div style="font-size:11px;color:var(--dim)">Def: ${m2a(c.pena_definitiva)}</div></div>
    <div class="st"><div class="st-l">Próximo evento</div><div class="st-v" style="color:${px.dias!==null&&px.dias<=30?'var(--r)':px.dias<=90?'var(--y)':'var(--g)'}">${px.dias!==null?px.dias+'d':'—'}</div><div style="font-size:11px;color:var(--dim)">${px.evento}</div></div></div>`;

    h+=`<div class="crd"><h2 style="font-size:16px">Dados do Caso</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px">
    <div><span style="color:var(--dim)">Condição:</span> <b>${c.condicao==='primario'?'Primário':c.condicao==='reincidente'?'Reincidente':'Reinc. específico'}</b></div>
    <div><span style="color:var(--dim)">Regime:</span> <b>${c.regime||'—'}</b></div>
    <div><span style="color:var(--dim)">Início:</span> <b>${fmt(c.dt_inicio_cumprimento)}</b></div>
    <div><span style="color:var(--dim)">Trânsito:</span> <b>${fmt(c.dt_transito)}</b></div>
    <div><span style="color:var(--dim)">Detração:</span> <b>${c.detracao_dias||0} dias</b></div>
    <div><span style="color:var(--dim)">Remição:</span> <b>${Math.floor((c.dias_trabalhados||0)/3)+Math.floor((c.horas_estudo||0)/12)+Math.min((c.livros_lidos||0)*4,48)} dias</b></div>
    <div><span style="color:var(--dim)">Hediondo:</span> <b>${c.hediondo?'Sim':'Não'}</b></div>
    <div><span style="color:var(--dim)">Violência:</span> <b>${c.violencia?'Sim':'Não'}</b></div></div>
    ${c.observacoes?`<div style="margin-top:12px;padding:12px;background:rgba(255,255,255,.015);border-radius:8px;font-size:12px;color:var(--dim)">${c.observacoes}</div>`:''}</div>`;

    // CRONOGRAMA
    if(c.dt_inicio_cumprimento){
    const p2=c.condicao==='primario',h2=c.hediondo,v2=c.violencia,o2=c.org_criminosa,re2=c.condicao==='reincidente_especifico';
    let fr;if(o2)fr=3/4;else if(h2)fr=p2?2/5:(re2?3/5:1/2);else if(v2)fr=p2?1/4:3/10;else fr=p2?4/25:1/5;
    let lf;if(o2)lf=null;else if(h2)lf=re2?null:2/3;else lf=p2?1/3:1/2;
    const dt=c.dt_inicio_cumprimento;
    const pt=(cor,label,data,sub)=>`<div style="position:relative;padding:10px 0 16px 20px">
    <div style="position:absolute;left:-8px;top:12px;width:14px;height:14px;border-radius:7px;background:${cor};border:2px solid var(--bg)"></div>
    <div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;font-weight:600">${label}</div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:${cor}">${data}</div>
    ${sub?`<div style="font-size:11px;color:var(--dim)">${sub}</div>`:''}</div>`;
    h+=`<div class="crd"><h2 style="font-size:16px">Cronograma</h2>
    <div style="position:relative;padding-left:24px">
    <div style="position:absolute;left:8px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--gold),var(--y),var(--g),var(--b));border-radius:1px"></div>`;
    h+=pt('var(--gold)','Início — '+c.regime,fmt(dt),'');
    if(c.regime==='Fechado'){
      h+=pt('var(--y)','Fechado → Semiaberto',fmt(addM(dt,pe*fr)),(diasAte(addM(dt,pe*fr))||0)+'d restantes');
      h+=pt('#9b59b6','Semiaberto → Aberto',fmt(addM(dt,2*pe*fr)),(diasAte(addM(dt,2*pe*fr))||0)+'d restantes');
    } else if(c.regime==='Semiaberto'){
      h+=pt('var(--y)','Semiaberto → Aberto',fmt(addM(dt,pe*fr)),(diasAte(addM(dt,pe*fr))||0)+'d restantes');
    }
    if(lf)h+=pt('var(--g)','Livramento condicional',fmt(addM(dt,pe*lf)),(diasAte(addM(dt,pe*lf))||0)+'d restantes');
    else h+=pt('var(--r)','Livramento condicional','Vedado','');
    h+=pt('var(--b)','Término da pena',fmt(addM(dt,pe)),(diasAte(addM(dt,pe))||0)+'d restantes');
    h+=`</div></div>`;}
  }

  h+=`</div>`;

  // CONFIRM DELETE
  if(confirmDel){
    h+=`<div class="ov"><div class="ov-b">
    <div style="font-size:18px;font-weight:700;color:var(--w);margin-bottom:12px">Excluir cliente?</div>
    <p style="font-size:13px;color:var(--dim);margin-bottom:24px">Esta ação é permanente. Todos os dados deste cliente serão apagados do banco de dados.</p>
    <div style="display:flex;gap:10px"><button class="btn d" onclick="doDelete('${confirmDel}')">Excluir</button>
    <button class="btn s" onclick="confirmDel=null;render()">Cancelar</button></div></div></div>`;
  }

  app.innerHTML=h;
}

// INIT
checkAuth();
</script>
</body>
</html>
