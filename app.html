<style>
:root{--bg:#08090e;--card:rgba(255,255,255,0.028);--brd:rgba(255,255,255,0.055);--gold:#c9a84c;--gold2:#e8cc73;--goldDim:rgba(201,168,76,0.10);--g:#3ecf8e;--gDim:rgba(62,207,142,0.07);--r:#f05a5a;--rDim:rgba(240,90,90,0.07);--b:#5b9cf5;--bDim:rgba(91,156,245,0.07);--y:#e8a838;--tx:#c8ced8;--dim:#6b7280;--w:#fff}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(201,168,76,0.025),transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(91,156,245,0.015),transparent 50%);pointer-events:none}
.wrap{max-width:880px;margin:0 auto;padding:24px 16px;position:relative;z-index:1}
.logo{text-align:center;padding:36px 0 24px}
.logo-icon{margin:0 auto 14px}
.logo h1{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:700;color:var(--w);letter-spacing:2px}
.logo h1 span{color:var(--gold)}
.logo p{font-size:10px;color:var(--gold);letter-spacing:5px;text-transform:uppercase;margin-top:6px;font-weight:600}
.logo-line{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto 0}
.steps{display:flex;gap:2px;margin-bottom:8px;padding:0 40px}
.steps div{flex:1;height:2px;border-radius:1px;transition:all .4s;cursor:pointer}
.step-labels{display:flex;justify-content:center;gap:24px;margin-bottom:24px}
.step-labels span{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .3s;font-weight:600}
.card{background:var(--card);border:1px solid var(--brd);border-radius:16px;padding:28px 24px;margin-bottom:14px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.12),transparent)}
.card h2{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--w);margin:0 0 6px;display:flex;align-items:center;gap:12px}
.card h2 .ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card h2 .ic svg{width:16px;height:16px}
.ic-gold{background:var(--goldDim);border:1px solid rgba(201,168,76,0.12);color:var(--gold)}
.ic-blue{background:var(--bDim);border:1px solid rgba(91,156,245,0.12);color:var(--b)}
.ic-green{background:var(--gDim);border:1px solid rgba(62,207,142,0.12);color:var(--g)}
.ic-red{background:var(--rDim);border:1px solid rgba(240,90,90,0.12);color:var(--r)}
.card-sub{font-size:12px;color:var(--dim);margin:0 0 18px;padding-left:42px}
.search{width:100%;padding:14px 20px;border-radius:12px;border:1px solid var(--brd);background:rgba(255,255,255,0.03);color:var(--w);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .3s}
.search:focus{border-color:var(--gold)}
.search::placeholder{color:#4a4f58}
.crime-list{max-height:400px;overflow-y:auto;margin-top:16px;scrollbar-width:thin;scrollbar-color:rgba(201,168,76,0.15) transparent}
.crime-item{padding:14px 18px;border-radius:12px;border:1px solid rgba(255,255,255,0.025);cursor:pointer;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;transition:all .2s}
.crime-item:hover{border-color:rgba(201,168,76,0.15);background:rgba(201,168,76,0.02)}
.crime-item.sel{border-color:var(--gold);background:rgba(201,168,76,0.05)}
.crime-item .name{font-weight:600;color:var(--w);font-size:14px}
.crime-item .meta{font-size:11px;color:var(--dim);margin-top:3px}
.badge{padding:3px 10px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.badge.hed{background:rgba(240,90,90,0.08);color:var(--r);border:1px solid rgba(240,90,90,0.12)}
.badge.vio{background:rgba(62,207,142,0.08);color:var(--g);border:1px solid rgba(62,207,142,0.12)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--brd);background:rgba(255,255,255,0.03);color:var(--w);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .3s}
.input:focus{border-color:var(--gold)}
label.sm{font-size:10px;color:var(--dim);letter-spacing:.5px;text-transform:uppercase;font-weight:600;display:block;margin-bottom:6px}
.info-box{padding:14px 18px;background:rgba(201,168,76,0.03);border-radius:12px;border:1px solid rgba(201,168,76,0.08)}
.opts{display:flex;gap:8px;flex-wrap:wrap}
.opt{padding:9px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.07);background:transparent;color:var(--dim);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.opt.on{border-color:var(--gold);background:var(--goldDim);color:var(--gold)}
.row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-radius:10px;margin-bottom:3px;cursor:pointer;transition:all .15s;border:1px solid rgba(255,255,255,0.025);gap:8px;flex-wrap:wrap}
.row:hover{background:rgba(255,255,255,0.015)}
.row.c-on{background:var(--rDim);border-color:rgba(240,90,90,0.15)}
.row.ag-on{background:var(--rDim);border-color:rgba(240,90,90,0.12)}
.row.at-on{background:var(--gDim);border-color:rgba(62,207,142,0.12)}
.dot{width:22px;height:22px;border-radius:6px;border:2px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;color:var(--w);transition:all .2s}
.dot.r{border-color:var(--r);background:var(--r)}
.dot.g{border-color:var(--g);background:var(--g)}
.iname{font-size:13px;color:#7b818a;transition:color .15s}
.iname.r{color:var(--r)}.iname.g{color:var(--g)}
.iart{font-size:10px;color:#3f444d;margin-top:1px}
.ifrac{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;min-width:36px;text-align:right}
.finput{width:70px;padding:6px 8px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:var(--w);font-family:'Cormorant Garamond',serif;font-size:15px;text-align:center;font-weight:600}
.rbox{border-radius:12px;padding:18px 20px;margin-bottom:10px;position:relative;overflow:hidden}
.rbox::before{content:'';position:absolute;top:0;left:0;right:0;height:1px}
.rbox.bl{background:var(--bDim);border:1px solid rgba(91,156,245,0.1)}.rbox.bl::before{background:linear-gradient(90deg,transparent,rgba(91,156,245,0.25),transparent)}
.rbox.gr{background:var(--gDim);border:1px solid rgba(62,207,142,0.1)}.rbox.gr::before{background:linear-gradient(90deg,transparent,rgba(62,207,142,0.25),transparent)}
.rbox.gd{background:var(--goldDim);border:1px solid rgba(201,168,76,0.1)}.rbox.gd::before{background:linear-gradient(90deg,transparent,rgba(201,168,76,0.25),transparent)}
.rl{font-size:10px;color:var(--dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.rv{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700}
.rv.bl{color:var(--b)}.rv.gr{color:var(--g)}.rv.gd{color:var(--gold)}
.rs{font-size:11px;color:var(--dim);margin-top:8px}
table{width:100%;border-collapse:separate;border-spacing:0;border-radius:12px;overflow:hidden;border:1px solid var(--brd)}
th{padding:12px 14px;background:rgba(201,168,76,0.05);color:var(--gold);text-align:left;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;border-bottom:1px solid var(--brd)}
td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,0.02);font-size:13px}
tr:last-child td{border-bottom:none}
.sc{text-align:center;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:16px}
.brow{display:flex;gap:10px;justify-content:space-between;margin-top:20px}
.btn{padding:14px 28px;border-radius:12px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .25s;font-family:'DM Sans',sans-serif;letter-spacing:.3px}
.btn.p{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);box-shadow:0 4px 20px rgba(201,168,76,0.15)}
.btn.p:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,168,76,0.25)}
.btn.s{background:rgba(255,255,255,0.03);color:var(--dim);border:1px solid var(--brd)}
.btn.s:hover{background:rgba(255,255,255,0.05);color:var(--w)}
.btn.f{width:100%;padding:18px;font-size:16px}
.warn{font-size:11px;color:var(--y);margin-top:10px;font-style:italic}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}.steps{padding:0}.logo h1{font-size:28px}}
</style>
</head>

    h+=`</div>`;

    // ATENUANTES
    h+=`<div class="card"><h2><span class="ic ic-green">II</span>Atenuantes</h2><div class="card-sub">Arts. 65-66 CP — Fração: 1/6 cada</div>`;
    AT.forEach((a,i)=>{const on=S.at[i];h+=`<div class="row${on?' at-on':''}" onclick="S.at[${i}]=!S.at[${i}];R()"><div style="flex:1"><span class="iname${on?' g':''}">${a.n}</span><br><span class="iart">${a.a}</span></div><span class="ifrac" style="color:var(--g)">${a.f}</span><div class="dot${on?' g':''}">${on?'✓':''}</div></div>`});
    h+=`<div class="grid2" style="margin-top:18px"><div class="rbox bl"><div class="rl">Pena intermediária · 1/8</div><div class="rv bl">${m2a(d.pi8)}</div></div><div class="rbox gr"><div class="rl">Pena intermediária · 1/6</div><div class="rv gr">${m2a(d.pi6)}</div></div></div>
    <p class="warn">⚠ Súmula 231/STJ — a pena não pode ficar abaixo do mínimo nem acima do máximo nesta fase.</p></div>`;

    // CAUSAS AUMENTO
    h+=`<div class="card"><h2><span class="ic ic-red">III</span>Causas de Aumento</h2><div class="card-sub">Selecione e ajuste a fração dentro do intervalo legal</div>`;
    CA.forEach((a,i)=>{const on=S.ca[i];h+=`<div class="row${on?' ag-on':''}"><div style="flex:1;min-width:180px;cursor:pointer" onclick="S.ca[${i}]=!S.ca[${i}];R()"><span class="iname${on?' r':''}">${a.n}</span><br><span class="iart">${a.a} — ${a.mn} a ${a.mx}</span></div>${on?`<input class="finput" type="number" step="0.01" value="${S.cf[i]??a.d}" onchange="S.cf[${i}]=parseFloat(this.value);R()" onclick="event.stopPropagation()">`:`<span class="ifrac" style="color:var(--dim)">${a.s}</span>`}<div class="dot${on?' r':''}" onclick="S.ca[${i}]=!S.ca[${i}];R()">${on?'✓':''}</div></div>`});
    h+=`</div>`;

    // CAUSAS DIMINUIÇÃO
    h+=`<div class="card"><h2><span class="ic ic-green">III</span>Causas de Diminuição</h2>`;
    CD.forEach((a,i)=>{const on=S.di[i];h+=`<div class="row${on?' at-on':''}"><div style="flex:1;min-width:180px;cursor:pointer" onclick="S.di[${i}]=!S.di[${i}];R()"><span class="iname${on?' g':''}">${a.n}</span><br><span class="iart">${a.a} — ${a.mn} a ${a.mx}</span></div>${on?`<input class="finput" type="number" step="0.01" value="${S.df[i]??a.d}" onchange="S.df[${i}]=parseFloat(this.value);R()" onclick="event.stopPropagation()">`:`<span class="ifrac" style="color:var(--dim)">${a.s}</span>`}<div class="dot${on?' g':''}" onclick="S.di[${i}]=!S.di[${i}];R()">${on?'✓':''}</div></div>`});
    h+=`</div>`;

    // RESULTADO
    h+=`<div class="card"><h2><span class="ic ic-gold">${IC.scales}</span>Resultado da Dosimetria</h2>
    <div class="grid2"><div class="rbox bl"><div class="rl">Pena Definitiva · 1/8</div><div class="rv bl">${m2a(d.pf8)}</div><div class="rs">Regime: ${d.regPf8} · Substituição: ${d.sub8?'Sim (Art. 44)':'Não'}</div></div>
    <div class="rbox gr"><div class="rl">Pena Definitiva · 1/6</div><div class="rv gr">${m2a(d.pf6)}</div><div class="rs">Regime: ${d.regPf6} · Substituição: ${d.sub8?'Sim (Art. 44)':'Não'}</div></div></div></div>`;

    // CONCURSO DE CRIMES
    const ccList=S.concCrimes;
    const ccPenas=ccList.map(c=>c.pena||0);
    const penaPrinc=d.pf8;
    let ccTotal=penaPrinc;
    if(ccPenas.length>0){
      const todas=[penaPrinc,...ccPenas].filter(p=>p>0);
      const maior=Math.max(...todas);
      if(S.concTipo==='material'||S.concTipo==='formal_imp') ccTotal=todas.reduce((a,b)=>a+b,0);
      else if(S.concTipo==='formal') ccTotal=maior*(1+S.concFrac);
      else ccTotal=maior*(1+S.concFrac);
    }
    const ccCap=Math.min(ccTotal,480);
    h+=`<div class="card"><h2><span class="ic ic-red">${IC.grid}</span>Concurso de Crimes</h2><div class="card-sub">Arts. 69-71 CP — Adicione penas de outros crimes para calcular o total combinado</div>
    <div style="margin-bottom:14px">
    <div style="padding:10px 14px;background:rgba(201,168,76,.03);border-radius:8px;border:1px solid rgba(201,168,76,.06);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
    <div><span style="font-size:13px;color:var(--w);font-weight:600">${S.crime.n}</span><br><span style="font-size:11px;color:var(--dim)">${S.crime.a} — Pena calculada (1/8)</span></div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--gold)">${m2a(penaPrinc)}</div></div>`;
    ccList.forEach((c,i)=>{
      h+=`<div style="padding:10px 14px;background:rgba(255,255,255,.015);border-radius:8px;border:1px solid rgba(255,255,255,.04);margin-bottom:4px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input class="input" style="flex:1;min-width:150px" placeholder="Crime (ex: Porte de arma)" value="${c.nome}" onchange="updConc(${i},'nome',this.value)">
      <div style="display:flex;align-items:center;gap:4px"><label class="sm" style="margin:0;white-space:nowrap">Pena (meses):</label>
      <input class="finput" type="number" min="1" value="${c.pena}" onchange="updConc(${i},'pena',parseInt(this.value)||0)"></div>
      <div class="dot r" style="cursor:pointer" onclick="rmConc(${i})">✕</div></div>`;
    });
    h+=`<button style="margin-top:8px;padding:10px 16px;border-radius:8px;border:1px dashed rgba(201,168,76,.2);background:transparent;color:var(--gold);font-size:13px;cursor:pointer;width:100%;font-weight:600" onclick="addConc()">+ Adicionar crime ao concurso</button></div>`;

    if(ccList.length>0){
    h+=`<div style="margin-bottom:14px"><label class="sm">Tipo de concurso</label>
    <div class="opts"><div class="opt${S.concTipo==='material'?' on':''}" onclick="S.concTipo='material';R()">Material (Art. 69) — Soma</div>
    <div class="opt${S.concTipo==='formal'?' on':''}" onclick="S.concTipo='formal';R()">Formal próprio (Art. 70) — Maior + fração</div>
    <div class="opt${S.concTipo==='formal_imp'?' on':''}" onclick="S.concTipo='formal_imp';R()">Formal impróprio (Art. 70, 2ª parte) — Soma</div>
    <div class="opt${S.concTipo==='continuado'?' on':''}" onclick="S.concTipo='continuado';R()">Continuado (Art. 71) — Maior + fração</div></div></div>`;

    if(S.concTipo==='formal'||S.concTipo==='continuado'){
    h+=`<div style="margin-bottom:14px"><label class="sm">Fração de aumento (${S.concTipo==='formal'?'1/6 a 1/2':'1/6 a 2/3'})</label>
    <div class="opts">
    <div class="opt${Math.abs(S.concFrac-1/6)<.01?' on':''}" onclick="S.concFrac=1/6;R()">1/6</div>
    <div class="opt${Math.abs(S.concFrac-1/5)<.01?' on':''}" onclick="S.concFrac=1/5;R()">1/5</div>
    <div class="opt${Math.abs(S.concFrac-1/4)<.01?' on':''}" onclick="S.concFrac=1/4;R()">1/4</div>
    <div class="opt${Math.abs(S.concFrac-1/3)<.01?' on':''}" onclick="S.concFrac=1/3;R()">1/3</div>
    <div class="opt${Math.abs(S.concFrac-1/2)<.01?' on':''}" onclick="S.concFrac=1/2;R()">1/2</div>
    ${S.concTipo==='continuado'?`<div class="opt${Math.abs(S.concFrac-2/3)<.01?' on':''}" onclick="S.concFrac=2/3;R()">2/3</div>`:''}</div></div>`;}

    if(S.concTipo==='continuado'){
    h+=`<p class="warn" style="margin-bottom:14px">⚠ Crime continuado específico (Art. 71, p.ú.): doloso, contra vítimas diferentes, com violência ou grave ameaça — pena pode ser aplicada até o triplo. Nesse caso, use concurso Material ou ajuste manualmente.</p>`}

    h+=`<table><thead><tr><th>Crime</th><th style="text-align:center">Pena</th></tr></thead><tbody>
    <tr><td>${S.crime.n}</td><td class="sc" style="color:var(--gold)">${m2a(penaPrinc)}</td></tr>`;
    ccList.forEach(c=>{if(c.pena>0)h+=`<tr><td>${c.nome||'—'}</td><td class="sc">${m2a(c.pena)}</td></tr>`});
    h+=`<tr style="background:rgba(201,168,76,.04)"><td style="font-weight:700">${(S.concTipo==='material'||S.concTipo==='formal_imp')?'Soma (Art. '+(S.concTipo==='material'?'69':'70, 2ª parte')+')':'Maior pena + '+f2s(S.concFrac)+' (Art. '+(S.concTipo==='formal'?'70':'71')+')'}</td><td class="sc" style="color:var(--gold);font-size:18px;font-weight:700">${m2a(ccTotal)}</td></tr>
    ${ccTotal>480?`<tr style="background:var(--rDim)"><td style="color:var(--r);font-weight:700">Limite Art. 75 CP (40 anos)</td><td class="sc" style="color:var(--r);font-size:18px;font-weight:700">${m2a(480)}</td></tr>`:''}</tbody></table>`;}
    h+=`</div>`;

    // BENEFÍCIOS POSSÍVEIS
    const cri=S.crime;const pMin=cri.mn/12;const pMax=cri.mx/12;const pDef8=d.pf8/12;const semVio=!cri.v;const culposo=cri.cu;
    const transacao=pMax<=2;
    const suspProc=pMin<=1;
    const anpp=pMin<4&&semVio&&S.prim&&!cri.h;

    h+=`<div class="card"><h2><span class="ic ic-green">${IC.file}</span>Benefícios Possíveis</h2><div class="card-sub">Análise automática com base no tipo penal e na pena calculada</div>

    <tr><td>Transação penal</td><td class="sc" style="color:${transacao?'var(--g)':'var(--r)'}">${transacao?'Sim*':'Não'}</td><td style="font-size:11px;color:var(--dim)">Art. 76, Lei 9.099/95</td><td style="font-size:11px;color:var(--dim)">Pena máx. ≤ 2 anos ${transacao?'✓':'✗'} (${pMax.toFixed(1)}a)</td></tr>
    <tr><td>Suspensão cond. do processo</td><td class="sc" style="color:${suspProc?'var(--g)':'var(--r)'}">${suspProc?'Sim*':'Não'}</td><td style="font-size:11px;color:var(--dim)">Art. 89, Lei 9.099/95</td><td style="font-size:11px;color:var(--dim)">Pena mín. ≤ 1 ano ${suspProc?'✓':'✗'} (${pMin.toFixed(1)}a)</td></tr>
    <tr><td>ANPP</td><td class="sc" style="color:${anpp?'var(--g)':'var(--r)'}">${anpp?'Sim*':'Não'}</td><td style="font-size:11px;color:var(--dim)">Art. 28-A, CPP</td><td style="font-size:11px;color:var(--dim)">Mín.<4a${pMin<4?'✓':'✗'} · S/violência${semVio?'✓':'✗'} · Primário${S.prim?'✓':'✗'} · Não hediondo${!cri.h?'✓':'✗'}</td></tr>
    <tr><td>Substituição por restritiva</td><td class="sc" style="color:${substituicao8?'var(--g)':'var(--r)'}">${substituicao8?'Sim':'Não'}</td><td style="font-size:11px;color:var(--dim)">Art. 44, CP</td><td style="font-size:11px;color:var(--dim)">${culposo?'Crime culposo ✓ (qualquer pena)':`Pena≤4a${d.pf8<=48?'✓':'✗'} · S/violência${semVio?'✓':'✗'} · Não reinc. espec.${!S.reincEsp?'✓':'✗'}`}</td></tr>
    <tr><td>Sursis (susp. da pena)</td><td class="sc" style="color:${sursis8?'var(--g)':'var(--r)'}">${sursis8?'Sim':'Não'}</td><td style="font-size:11px;color:var(--dim)">Art. 77, CP ${S.m70?'(§2º — idoso)':''}</td><td style="font-size:11px;color:var(--dim)">${S.m70?'Maior 70 ✓ · Pena≤4a'+(d.pf8<=48?'✓':'✗'):'Pena≤2a'+(d.pf8<=24?'✓':'✗')+' · Primário'+(S.prim?'✓':'✗')}</td></tr>
    ${cri.dt?`<tr><td colspan="4" style="font-size:11px;color:var(--y);font-style:italic">⚠ Crime punido com detenção — não admite regime inicialmente Fechado (Art. 33, caput, CP)</td></tr>`:''}
    <tr><td colspan="4" style="font-size:10px;color:var(--dim);font-style:italic;padding-top:8px">* Verificar também: não ter sido beneficiado nos últimos 5 anos (transação/ANPP); não ser caso de violência doméstica (ANPP, Art. 28-A, §2º, IV); requisitos subjetivos do Art. 77 (sursis). Requisitos que dependem do histórico processual devem ser confirmados pelo advogado.</td></tr></tbody></table></div>`;

    // VERIFICAÇÃO DE REINCIDÊNCIA
    const reincDias=S.dtFimPenaAnt?Math.round((new Date()-new Date(S.dtFimPenaAnt))/86400000):null;
    const reincExpirou=reincDias!==null&&reincDias>1826;
    h+=`<div class="card"><h2><span class="ic ic-blue">${IC.clock}</span>Verificação de Reincidência</h2><div class="card-sub">Art. 64, I, CP — Não prevalece se passados 5 anos do cumprimento ou extinção da pena anterior</div>
    <div style="margin-bottom:12px"><label class="sm">Data do fim da pena anterior (ou extinção)</label><input class="input" type="date" value="${S.dtFimPenaAnt}" onchange="S.dtFimPenaAnt=this.value;R()"></div>
    ${reincDias!==null?`<div class="rbox ${reincExpirou?'gr':'gd'}"><div class="rl">${reincExpirou?'Reincidência expirada':'Ainda reincidente'}</div>
    <div style="font-size:16px;font-weight:700;color:${reincExpirou?'var(--g)':'var(--gold)'}">${reincDias} dias desde o cumprimento (${(reincDias/365).toFixed(1)} anos)</div>
    <div class="rs">${reincExpirou?'Mais de 5 anos (1.826 dias) — Art. 64, I, CP. Tecnicamente primário para fins de dosimetria.':'Menos de 5 anos — reincidência ainda vigente.'}</div></div>`:''}</div>`;

    // PENA DE MULTA
    const smAtual=S.salMin;
    const multaMin=10*(smAtual/30);const multaMax=360*(smAtual*5);
    h+=`<div class="card"><h2><span class="ic ic-gold">${IC.case}</span>Pena de Multa</h2><div class="card-sub">Art. 49-52 CP — Dias-multa (10 a 360) × valor do dia-multa (1/30 a 5× salário mínimo)</div>
    <div style="margin-bottom:12px"><label class="sm">Salário mínimo vigente (R$)</label><input class="input" type="number" value="${S.salMin}" onchange="S.salMin=parseFloat(this.value)||1518;R()" style="max-width:200px"></div>
    <table><thead><tr><th></th><th style="text-align:center">Mínimo</th><th style="text-align:center">Máximo</th></tr></thead><tbody>
    <tr><td>Dias-multa</td><td class="sc">10</td><td class="sc">360</td></tr>
    <tr><td>Valor do dia-multa</td><td class="sc">R$ ${(smAtual/30).toFixed(2)}</td><td class="sc">R$ ${(smAtual*5).toFixed(2)}</td></tr>
    <tr style="background:rgba(201,168,76,.04)"><td style="font-weight:700">Multa total</td><td class="sc" style="color:var(--g);font-weight:700">R$ ${multaMin.toFixed(2)}</td><td class="sc" style="color:var(--r);font-weight:700">R$ ${multaMax.toFixed(2)}</td></tr>
    <tr><td colspan="3" style="font-size:10px;color:var(--dim);font-style:italic">Intervalo geral do CP (Arts. 49-52). O tipo penal específico pode prever faixa própria. Multa pode ser triplicada se ineficaz (Art. 60, §1º). Em tráfico: 500-1.500 dias-multa (Art. 33, Lei 11.343).</td></tr>
    </tbody></table></div>`;

    // FIANÇA
    const pMaxAnos=cri.mx/12;const inafiancavel=cri.h||cri.n.includes("Tráfico")||cri.n.includes("terrorismo");
    const fiancaDel=pMaxAnos<=4;
    h+=`<div class="card"><h2><span class="ic ic-blue">${IC.lock}</span>Fiança</h2><div class="card-sub">Arts. 322-326, CPP — Valores e autoridade competente</div>
    ${inafiancavel?`<div class="rbox" style="background:var(--rDim);border-color:rgba(240,90,90,.12)"><div class="rl" style="color:var(--r)">Crime inafiançável</div>
    <div style="font-size:15px;font-weight:700;color:var(--r)">Art. 323, CPP — Fiança vedada</div>
    <div class="rs">Crimes hediondos, tráfico, tortura e terrorismo não admitem fiança.</div></div>`
    :`<table><thead><tr><th>Autoridade</th><th style="text-align:center">Faixa</th><th style="text-align:center">Valor (SM: R$ ${smAtual})</th></tr></thead><tbody>
    ${fiancaDel?`<tr><td>Delegado (pena máx. ≤ 4a)</td><td class="sc">1 a 100 SM</td><td class="sc" style="color:var(--g)">R$ ${smAtual.toFixed(0)} a R$ ${(smAtual*100).toFixed(0)}</td></tr>`
    :`<tr><td>Juiz (pena máx. > 4a)</td><td class="sc">10 a 200 SM</td><td class="sc" style="color:var(--y)">R$ ${(smAtual*10).toFixed(0)} a R$ ${(smAtual*200).toFixed(0)}</td></tr>`}
    </tbody></table>
    <div class="rs" style="margin-top:8px">Pena máxima do crime: ${pMaxAnos} anos — ${fiancaDel?'Delegado pode arbitrar (Art. 322, CPP)':'Somente o juiz pode arbitrar (Art. 325, CPP)'}</div>`}
    </div>`;

    h+=`<div class="brow"><button class="btn s" onclick="go(0)">← Voltar</button><button class="btn p" onclick="go(2)">Execução Penal →</button></div>`;
  }

  // EXECUÇÃO
  if(S.step===2&&S.crime){
    h+=`<div class="card"><h2><span class="ic ic-gold">${IC.hourglass}</span>Dados do Cumprimento</h2>
    <div class="grid2" style="margin-bottom:12px"><div><label class="sm">Data início do cumprimento</label><input class="input" type="date" value="${S.dtInicio}" onchange="S.dtInicio=this.value;R()"></div>
    <div><label class="sm">Detração — dias prisão provisória</label><input class="input" type="number" min="0" value="${S.detDias}" onchange="S.detDias=parseInt(this.value)||0;R()"></div></div>
    <div class="grid2"><div><label class="sm">Regime inicial de cumprimento</label>
    <div class="opts"><div class="opt${S.regimeIni==='auto'?' on':''}" onclick="S.regimeIni='auto';R()">Auto (${d.regPf8})</div><div class="opt${S.regimeIni==='Fechado'?' on':''}" onclick="S.regimeIni='Fechado';R()">Fechado</div><div class="opt${S.regimeIni==='Semiaberto'?' on':''}" onclick="S.regimeIni='Semiaberto';R()">Semiaberto</div><div class="opt${S.regimeIni==='Aberto'?' on':''}" onclick="S.regimeIni='Aberto';R()">Aberto</div></div>
    </div>
    <div style="display:flex;align-items:end"><div class="rbox gd" style="margin:0;flex:1"><div class="rl">Regime inicial</div><div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--gold)">${d.regIni}</div></div></div></div></div>`;

    h+=`<div class="card"><h2><span class="ic ic-green">${IC.clock}</span>Remição</h2><div class="card-sub">Art. 126 LEP — Trabalho: 3 dias = 1 dia · Estudo: 12h = 1 dia · Leitura: 1 livro = 4 dias (máx 48/ano)</div>
    <div class="grid3" style="margin-bottom:12px">
    <div><label class="sm">Dias trabalhados</label><input class="input" type="number" min="0" value="${S.diasTrab}" onchange="S.diasTrab=parseInt(this.value)||0;R()"></div>
    <div><label class="sm">Horas de estudo</label><input class="input" type="number" min="0" value="${S.horasEstudo}" onchange="S.horasEstudo=parseInt(this.value)||0;R()"></div>
    <div><label class="sm">Livros lidos (resenha)</label><input class="input" type="number" min="0" max="12" value="${S.livrosLidos}" onchange="S.livrosLidos=parseInt(this.value)||0;R()"></div></div>
    <div class="opts" style="margin-bottom:14px">
    <div class="opt${S.concluiuEnsino?' on':''}" onclick="S.concluiuEnsino=!S.concluiuEnsino;R()">Concluiu ensino (bônus +1/3)</div>
    <div class="opt${S.faltaGrave?' on':''}" onclick="S.faltaGrave=!S.faltaGrave;R()" style="${S.faltaGrave?'border-color:var(--r);background:var(--rDim);color:var(--r)':''}">Falta grave (perde 1/3)</div>
    </div>
    ${(d.remBruto>0||d.perdaFG>0)?`<table><thead><tr><th>Tipo</th><th style="text-align:center">Realizado</th><th style="text-align:center">Dias remidos</th><th style="text-align:center">Fundamento</th></tr></thead><tbody>
